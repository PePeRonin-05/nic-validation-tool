---
- name: Setup
  hosts: iperf_loopback
  become: yes
  gather_facts: no
  roles:
    - common
    - role: diagnostics
      vars: { diag_phase: pre }

- name: Test
  hosts: iperf_loopback
  become: yes
  gather_facts: no
  tasks:
    - block:
        - include_role:
            name: iperf_loopback
      rescue:
        - name: Test failed — running emergency cleanup
          include_role:
            name: cleanup

- name: Finalize
  hosts: iperf_loopback
  become: yes
  gather_facts: no
  tasks:
    - include_role:
        name: diagnostics
      vars: { diag_phase: post }

    - block:
        - include_role:
            name: parse_results
      rescue:
        - name: Record threshold failure
          set_fact:
            _threshold_failed: true
        - debug:
            msg: "⚠️  Results below threshold — collecting logs before failing"

    - include_role:
        name: collect_logs

    - include_role:
        name: cleanup

    - name: Fail if thresholds were not met
      fail:
        msg: "❌ iperf3 bandwidth did not meet minimum threshold"
      when: _threshold_failed | default(false)
