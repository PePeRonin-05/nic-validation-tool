ansible_user:     root
ansible_ssh_pass: "12345678"

iperf_parallel:  4
iperf_port_base: 5200
remote_log_dir:  /tmp/nic_test_logs
local_log_dir:   "./local_logs"

log_subdirs:
  - iperf
  - iface_status
  - pci_logs

# ── Addressing ────────────────────────────────────────────────────────────────
# IPv4 auto-scheme per pair index:
#   192.168.{idx+1}.1  — server port
#   192.168.{idx+1}.2  — client port
# iperf uses link-local IPv6 (fe80::, auto-generated by kernel, always present)
# RDMA uses IPv4

test_mtu:           9000

ipv4_net:           "192.168"
ipv4_server_octet:  1
ipv4_client_octet:  2

# ── RDMA ──────────────────────────────────────────────────────────────────────
rdma_qp:            8
rdma_msg_size:      16384
rdma_port_base:     18100

# ── PASS/FAIL thresholds ──────────────────────────────────────────────────────
thresholds:
  iperf_min_gbps:       85
  rdma_read_min_gbps:   90
  rdma_write_min_gbps:  90
